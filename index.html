<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我们的日记本</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="sync-toast" id="sync-toast">同步中...</div>

<div class="book-wrapper">

  <div class="page-left">
    <div class="page-header">
      <svg class="heart" viewBox="0 0 24 24" fill="#d4818b"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <h2>媳妇的记录</h2>
      <span class="count" id="wife-count">0</span>
    </div>
    <div class="page-messages" id="page-wife">
      <div class="page-empty">还没有记录</div>
    </div>
  </div>

  <div class="spine"></div>

  <div class="page-right">
    <div class="page-header">
      <svg class="heart" viewBox="0 0 24 24" fill="#5b8db8"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <h2>我的记录</h2>
      <span class="count" id="me-count">0</span>
    </div>
    <div class="page-messages" id="page-me">
      <div class="page-empty">还没有记录</div>
    </div>
  </div>

</div>

<div class="input-dock">
  <div class="sender-pick">
    <button class="sender-pick-btn active wife" id="pick-wife" title="媳妇">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    </button>
    <button class="sender-pick-btn me" id="pick-me" title="我">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    </button>
  </div>
  <textarea id="memo-input" placeholder="写点什么..." rows="1"></textarea>
  <button id="send-btn" class="send-btn" title="记录">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
  </button>
</div>

<script src="/app.js"></script>
<script>
(function() {
  var currentSender = 'wife';
  var editingId = null;

  var pickWife = document.getElementById('pick-wife');
  var pickMe = document.getElementById('pick-me');
  var memoInput = document.getElementById('memo-input');
  var sendBtn = document.getElementById('send-btn');
  var pageWife = document.getElementById('page-wife');
  var pageMe = document.getElementById('page-me');
  var wifeCount = document.getElementById('wife-count');
  var meCount = document.getElementById('me-count');
  var syncToast = document.getElementById('sync-toast');

  pickWife.addEventListener('click', function() {
    currentSender = 'wife';
    pickWife.classList.add('active');
    pickMe.classList.remove('active');
  });

  pickMe.addEventListener('click', function() {
    currentSender = 'me';
    pickMe.classList.add('active');
    pickWife.classList.remove('active');
  });

  sendBtn.addEventListener('click', send);
  memoInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  memoInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  async function send() {
    var text = memoInput.value.trim();
    if (!text) return;

    if (editingId) {
      try {
        showSync(true);
        await api.update(editingId, { content: text });
        editingId = null;
        sendBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
      } catch (e) {
        showSync(false);
        return;
      }
    } else {
      try {
        showSync(true);
        await api.add({ sender: currentSender, content: text });
      } catch (e) {
        showSync(false);
        return;
      }
    }

    memoInput.value = '';
    memoInput.style.height = 'auto';
    showSync(false);
    await loadAndRender();
  }

  function showSync(show) {
    syncToast.classList.toggle('show', show);
  }

  pageWife.addEventListener('click', handleAction);
  pageMe.addEventListener('click', handleAction);

  function handleAction(e) {
    var btn = e.target.closest('[data-action]');
    if (!btn) return;
    var id = btn.dataset.id;
    var action = btn.dataset.action;

    if (action === 'star') {
      var starred = btn.classList.contains('starred');
      showSync(true);
      api.update(id, { starred: !starred }).then(function() {
        showSync(false);
        loadAndRender();
      });
    }
    if (action === 'delete') {
      if (!confirm('删除这条记录？')) return;
      showSync(true);
      api.remove(id).then(function() {
        showSync(false);
        loadAndRender();
      });
    }
    if (action === 'edit') {
      var msg = e.target.closest('.note-card');
      var text = msg.querySelector('.note-text').textContent;
      memoInput.value = text;
      memoInput.focus();
      memoInput.style.height = 'auto';
      memoInput.style.height = Math.min(memoInput.scrollHeight, 100) + 'px';
      editingId = id;

      var page = e.target.closest('.page-left, .page-right');
      if (page && page.classList.contains('page-left')) {
        currentSender = 'wife';
        pickWife.classList.add('active');
        pickMe.classList.remove('active');
      } else {
        currentSender = 'me';
        pickMe.classList.add('active');
        pickWife.classList.remove('active');
      }
      sendBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>';
    }
  }

  async function loadAndRender() {
    try {
      var messages = await api.getAll();
    } catch (e) {
      return;
    }

    messages.sort(function(a, b) {
      return new Date(a.createdAt) - new Date(b.createdAt);
    });

    var wifeMsgs = messages.filter(function(m) { return m.sender === 'wife'; });
    var meMsgs = messages.filter(function(m) { return m.sender === 'me'; });

    wifeCount.textContent = wifeMsgs.length;
    meCount.textContent = meMsgs.length;

    pageWife.innerHTML = wifeMsgs.length === 0
      ? '<div class="page-empty">还没有记录</div>'
      : renderNotes(wifeMsgs);

    pageMe.innerHTML = meMsgs.length === 0
      ? '<div class="page-empty">还没有记录</div>'
      : renderNotes(meMsgs);
  }

  function renderNotes(messages) {
    return messages.map(function(msg) {
      var t = formatTime(msg.createdAt);
      return '<div class="note-card">' +
        '<div class="note-text">' + msg.content.replace(/\n/g, '<br>') + '</div>' +
        '<div class="note-time">' +
          '<span>' + t + '</span>' +
          '<span class="note-actions">' +
            '<button class="note-btn' + (msg.starred ? ' starred' : '') + '" data-action="star" data-id="' + msg.id + '">' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="' + (msg.starred ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' +
            '</button>' +
            '<button class="note-btn" data-action="edit" data-id="' + msg.id + '">' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
            '</button>' +
            '<button class="note-btn" data-action="delete" data-id="' + msg.id + '">' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>' +
            '</button>' +
          '</span>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  loadAndRender();
})();
</script>
</body>
</html>
