<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章详情 - 我的博客</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="navbar">
  <div class="container">
    <a href="/" class="logo">我的博客</a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/editor.html">写文章</a>
    </div>
  </div>
</nav>

<main class="container">
  <article id="article-content" class="article-detail">
    <p class="loading">加载中...</p>
  </article>
</main>

<footer>
  <div class="container">
    <p>&copy; 2026 我的博客</p>
  </div>
</footer>

<script src="/app.js"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var container = document.getElementById('article-content');

  if (!id) {
    window.location.href = '/';
    return;
  }

  var post = BlogStore.getById(id);
  if (!post) {
    container.innerHTML = '<p class="error">文章不存在</p>';
    return;
  }

  document.title = post.title + ' - 我的博客';
  container.innerHTML =
    '<header class="article-header">' +
      '<h1>' + escapeHtml(post.title) + '</h1>' +
      '<div class="article-meta">' +
        '<time datetime="' + post.createdAt + '">发布于 ' + formatDate(post.createdAt) + '</time>' +
        (post.updatedAt !== post.createdAt ? '<span>更新于 ' + formatDate(post.updatedAt) + '</span>' : '') +
      '</div>' +
    '</header>' +
    '<div class="article-body">' + post.content + '</div>' +
    '<div class="article-actions">' +
      '<a href="/editor.html?id=' + post.id + '" class="btn btn-secondary">编辑</a>' +
      '<button id="delete-btn" class="btn btn-danger">删除</button>' +
    '</div>';

  document.getElementById('delete-btn').addEventListener('click', function() {
    if (!confirm('确定要删除这篇文章吗？')) return;
    BlogStore.remove(id);
    window.location.href = '/';
  });
})();
</script>
</body>
</html>
